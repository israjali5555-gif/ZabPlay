<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <link href="https://fonts.googleapis.com/icon?family=Material+Icons" rel="stylesheet">
    <title>ZabPlay - Unlimited Experience</title>
    
    <script>
        if (localStorage.getItem('isLoggedIn') !== 'true') {
            window.location.href = 'login.html';
        }
    </script>

    <style>
        body { background:#0F0F0F; margin:0; font-family: Roboto, Arial, sans-serif; color: white; overflow-x: hidden; }
        
        /* === LOGO FIX === */
        .zab-logo-box {
            width: 32px; height: 32px;
            background: linear-gradient(135deg, #FF0000 0%, #8B0000 100%);
            border-radius: 8px;
            display: flex; align-items: center; justify-content: center;
            box-shadow: 0 0 10px rgba(255, 0, 0, 0.4);
            border: 1px solid rgba(255, 255, 255, 0.1);
        }
        .zab-logo-box::after {
            content: '';
            border-top: 6px solid transparent; border-bottom: 6px solid transparent;
            border-left: 10px solid white; margin-left: 2px;
        }

        .splash-logo-box {
            width: 100px; height: 100px;
            background: linear-gradient(135deg, #FF0000 0%, #8B0000 100%);
            border-radius: 20px;
            display: flex; align-items: center; justify-content: center;
            box-shadow: 0 0 30px rgba(255, 0, 0, 0.6);
        }
        .splash-logo-box::after {
            content: '';
            border-top: 20px solid transparent; border-bottom: 20px solid transparent;
            border-left: 35px solid white; margin-left: 5px;
        }

        /* === VIDEO FEED STYLE === */
        .video-card { width: 100%; margin-bottom: 15px; animation: fadeIn 0.5s ease-in; cursor: pointer; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
        
        .thumbnail-container { position: relative; width: 100%; aspect-ratio: 16/9; background: #222; }
        .thumbnail-container img { width: 100%; height: 100%; object-fit: cover; }
        
        .video-info { display: flex; padding: 12px; gap: 12px; }
        .channel-icon { width: 40px; height: 40px; border-radius: 50%; background: #333; flex-shrink: 0; object-fit: cover; }
        
        .video-text h3 { font-size: 15px; margin: 0; line-height: 1.4; display: -webkit-box; -webkit-line-clamp: 2; -webkit-box-orient: vertical; overflow: hidden; }
        .video-text p { font-size: 12px; color: #aaa; margin: 5px 0 0 0; }

        .header { position: sticky; top: 0; background: #0F0F0F; z-index: 1000; display: flex; align-items: center; justify-content: space-between; padding: 10px 15px; border-bottom: 1px solid #222; }
        .brand-container { display: flex; align-items: center; gap: 10px; }
        .brand-name { font-size: 20px; font-weight: bold; letter-spacing: -0.5px; }

        .bottom-nav { position: fixed; bottom: 0; width: 100%; background: #0F0F0F; display: flex; justify-content: space-around; padding: 8px 0; border-top: 1px solid #333; z-index: 1000; }
        .nav-item { color: white; text-align: center; font-size: 10px; text-decoration: none; opacity: 0.6; cursor: pointer; }
        .nav-item i { font-size: 24px; display: block; margin-bottom: 2px; }
        .nav-item:active, .nav-item.active { opacity: 1; color: #FF0000; }

        #zabplay-splash { position: fixed; inset: 0; background: #0F0F0F; display: flex; flex-direction: column; justify-content: center; align-items: center; z-index: 9999; }
        .loading-shimmer { padding: 20px; text-align: center; color: #FF0000; font-weight: bold; font-size: 14px; }
    </style>
</head>
<body>

    <div id="zabplay-splash">
        <div class="splash-logo-box"></div>
        <h2 style="margin-top: 20px; letter-spacing: 2px; font-family: sans-serif;">ZABPLAY</h2>
    </div>

    <header class="header" id="main-header">
        <div class="brand-container">
            <div class="zab-logo-box"></div>
            <span class="brand-name">ZabPlay</span>
        </div>
        <div style="display: flex; gap: 18px; align-items: center;">
            <i class="material-icons">cast</i>
            <i class="material-icons" onclick="loadCategory('New Hindi Movies 2026')">search</i>
            <div style="width: 28px; height: 28px; border-radius: 50%; background: #FF5722; text-align: center; line-height: 28px; font-weight: bold; font-size: 14px; cursor: pointer;" onclick="logout()">R</div>
        </div>
    </header>

    <main id="main-video-feed" style="padding-bottom: 70px;"></main>
    
    <div id="loading" class="loading-shimmer">MIXING UNLIMITED CONTENT...</div>

    <nav class="bottom-nav">
        <div class="nav-item active" onclick="location.reload()"><i class="material-icons">home</i>Home</div>
        <div class="nav-item" onclick="window.location.href='shorts.html'"><i class="material-icons">bolt</i>Shorts</div>
        <div class="nav-item" onclick="loadCategory('New Punjabi Music 2026')"><i class="material-icons">subscriptions</i>Subs</div>
        <div class="nav-item" onclick="alert('Library Empty')"><i class="material-icons">video_library</i>Library</div>
    </nav>

    <script>
        // TEENON API KEYS ROTATION
        const API_KEYS = [
            'AIzaSyC8od7zBiEtYiTrp-7b1qbUicec4yGgXOs',
            'AIzaSyDq0kXgyqtOFXPjytI5yw5tuIZYl-xuTFs',
            'AIzaSyBsEsHKy70X0jKIz3y2NNe863uCr45_qHg'
        ];
        let currentKeyIndex = 0;
        const videoFeed = document.getElementById('main-video-feed');
        let isLoading = false;
        let loadedVideoIds = new Set();

        const mixTopics = [
            "New Bollywood Full Movies 2026", 
            "Latest Punjabi Hit Songs 2026", 
            "Pakistani Drama Full Episode Today", 
            "Bhojpuri New Video Gana", 
            "Hollywood Dubbed Movies Full", 
            "South Movie Hindi Dubbed 2026"
        ];

        window.onload = () => {
            setTimeout(() => {
                const splash = document.getElementById('zabplay-splash');
                splash.style.transition = 'opacity 0.5s';
                splash.style.opacity = '0';
                setTimeout(() => splash.style.display = 'none', 500);
                fetchUnlimitedHome();
            }, 2500);
        };

        // UNLIMITED PROXY SYSTEM (Limit Nahi Lagegi)
        async function fetchUnlimitedHome() {
            if (isLoading) return;
            isLoading = true;
            document.getElementById('loading').style.display = 'block';
            
            let query = mixTopics[Math.floor(Math.random() * mixTopics.length)];

            try {
                // Piped API (Unlimited Search)
                const res = await fetch(`https://pipedapi.kavin.rocks/search?q=${encodeURIComponent(query)}&filter=videos`);
                const data = await res.json();
                
                if(data.content) {
                    data.content.forEach(v => {
                        // Home par Shorts nahi dikhane ka logic
                        if(v.duration < 60 || loadedVideoIds.has(v.videoId)) return;
                        loadedVideoIds.add(v.videoId);

                        const card = document.createElement('div');
                        card.className = 'video-card';
                        card.onclick = () => window.location.href = `player.html?v=${v.videoId}`;
                        card.innerHTML = `
                            <div class="thumbnail-container">
                                <img src="${v.thumbnail}">
                            </div>
                            <div class="video-info">
                                <img class="channel-icon" src="${v.uploaderAvatar || 'https://ui-avatars.com/api/?name=Z'}">
                                <div class="video-text">
                                    <h3>${v.title}</h3>
                                    <p>${v.uploaderName} • ${v.views.toLocaleString()} views</p>
                                </div>
                            </div>`;
                        videoFeed.appendChild(card);
                    });
                }
            } catch (e) { 
                console.log("Proxy failed, trying API Key...");
                fetchFromYouTubeAPI(query);
            } finally {
                isLoading = false;
                document.getElementById('loading').style.display = 'none';
            }
        }

        // BACKUP YOUTUBE API (Agar Proxy fail ho)
        async function fetchFromYouTubeAPI(query) {
            const key = API_KEYS[currentKeyIndex];
            try {
                const res = await fetch(`https://www.googleapis.com/youtube/v3/search?part=snippet&maxResults=10&q=${encodeURIComponent(query)}&type=video&videoDuration=medium&key=${key}`);
                if(res.status === 403 && currentKeyIndex < API_KEYS.length - 1) {
                    currentKeyIndex++;
                    return fetchFromYouTubeAPI(query);
                }
                const data = await res.json();
                // Rendering logic same as above for data.items...
            } catch (err) { console.error(err); }
        }

        window.onscroll = () => {
            if ((window.innerHeight + window.scrollY) >= document.body.offsetHeight - 1200) {
                fetchUnlimitedHome();
            }
        };

        function logout() { localStorage.removeItem('isLoggedIn'); window.location.href = 'login.html'; }
    </script>
</body>
</html>
