<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <link href="https://fonts.googleapis.com/icon?family=Material+Icons" rel="stylesheet">
    <title>ZabPlay - Unlimited Experience</title>
    
    <script>
        if (localStorage.getItem('isLoggedIn') !== 'true') {
            window.location.href = 'login.html';
        }
    </script>

    <style>
        body { background:#0F0F0F; margin:0; font-family: Roboto, Arial, sans-serif; color: white; overflow-x: hidden; }
        
        /* === LOGO FIX === */
        .zab-logo-box {
            width: 32px; height: 32px;
            background: linear-gradient(135deg, #FF0000 0%, #8B0000 100%);
            border-radius: 8px;
            display: flex; align-items: center; justify-content: center;
            box-shadow: 0 0 10px rgba(255, 0, 0, 0.4);
            border: 1px solid rgba(255, 255, 255, 0.1);
        }
        .zab-logo-box::after {
            content: '';
            border-top: 6px solid transparent; border-bottom: 6px solid transparent;
            border-left: 10px solid white; margin-left: 2px;
        }

        .splash-logo-box {
            width: 100px; height: 100px;
            background: linear-gradient(135deg, #FF0000 0%, #8B0000 100%);
            border-radius: 20px;
            display: flex; align-items: center; justify-content: center;
            box-shadow: 0 0 30px rgba(255, 0, 0, 0.6);
        }
        .splash-logo-box::after {
            content: '';
            border-top: 20px solid transparent; border-bottom: 20px solid transparent;
            border-left: 35px solid white; margin-left: 5px;
        }

        /* === VIDEO FEED STYLE === */
        .video-card { width: 100%; margin-bottom: 15px; animation: fadeIn 0.5s ease-in; cursor: pointer; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
        
        .thumbnail-container { position: relative; width: 100%; aspect-ratio: 16/9; background: #222; }
        .thumbnail-container img { width: 100%; height: 100%; object-fit: cover; }
        
        /* SHORTS VERTICAL SCROLL - YouTube Style Fix */
        .shorts-container { 
            height: calc(100vh - 70px); 
            overflow-y: scroll; 
            scroll-snap-type: y mandatory;
            background: #000;
        }
        .short-card-full { 
            height: calc(100vh - 70px); 
            width: 100vw; 
            scroll-snap-align: start; 
            position: relative; 
            background: #000;
            display: flex;
            align-items: center;
            justify-content: center;
        }
        .short-card-full img { width: 100%; height: 100%; object-fit: contain; background: #000; }

        .short-overlay { position: absolute; inset: 0; background: linear-gradient(to bottom, transparent 60%, rgba(0,0,0,0.9)); display: flex; flex-direction: column; justify-content: flex-end; padding: 20px; pointer-events: none; }
        .short-title { font-size: 14px; font-weight: 500; margin-bottom: 10px; text-shadow: 1px 1px 4px black; max-width: 85%; }
        
        .short-actions { position: absolute; bottom: 80px; right: 10px; display: flex; flex-direction: column; gap: 15px; align-items: center; z-index: 10; }
        .short-actions div { text-align: center; font-size: 11px; font-weight: bold; text-shadow: 1px 1px 2px black; }
        .short-actions i { font-size: 30px; color: white; cursor: pointer; display: block; margin-bottom: 2px; }

        .video-info { display: flex; padding: 12px; gap: 12px; }
        .channel-icon { width: 40px; height: 40px; border-radius: 50%; background: #333; flex-shrink: 0; object-fit: cover; }
        
        .video-text h3 { font-size: 15px; margin: 0; line-height: 1.4; display: -webkit-box; -webkit-line-clamp: 2; -webkit-box-orient: vertical; overflow: hidden; }
        .video-text p { font-size: 12px; color: #aaa; margin: 5px 0 0 0; }

        .header { position: sticky; top: 0; background: #0F0F0F; z-index: 1000; display: flex; align-items: center; justify-content: space-between; padding: 10px 15px; border-bottom: 1px solid #222; }
        .brand-container { display: flex; align-items: center; gap: 10px; }
        .brand-name { font-size: 20px; font-weight: bold; letter-spacing: -0.5px; }

        .bottom-nav { position: fixed; bottom: 0; width: 100%; background: #0F0F0F; display: flex; justify-content: space-around; padding: 8px 0; border-top: 1px solid #333; z-index: 1000; }
        .nav-item { color: white; text-align: center; font-size: 10px; text-decoration: none; opacity: 0.6; cursor: pointer; }
        .nav-item i { font-size: 24px; display: block; margin-bottom: 2px; }
        .nav-item:active, .nav-item.active { opacity: 1; color: #FF0000; }

        #zabplay-splash { position: fixed; inset: 0; background: #0F0F0F; display: flex; flex-direction: column; justify-content: center; align-items: center; z-index: 9999; }
        .loading-shimmer { padding: 20px; text-align: center; color: #FF0000; font-weight: bold; font-size: 14px; }
    </style>
</head>
<body>

    <div id="zabplay-splash">
        <div class="splash-logo-box"></div>
        <h2 style="margin-top: 20px; letter-spacing: 2px; font-family: sans-serif;">ZABPLAY</h2>
    </div>

    <header class="header" id="main-header">
        <div class="brand-container">
            <div class="zab-logo-box"></div>
            <span class="brand-name">ZabPlay</span>
        </div>
        <div style="display: flex; gap: 18px; align-items: center;">
            <i class="material-icons">cast</i>
            <i class="material-icons" onclick="loadCategory('New Hindi Movies 2026')">search</i>
            <div style="width: 28px; height: 28px; border-radius: 50%; background: #FF5722; text-align: center; line-height: 28px; font-weight: bold; font-size: 14px; cursor: pointer;" onclick="logout()">R</div>
        </div>
    </header>

    <main id="main-video-feed" style="padding-bottom: 70px;"></main>
    
    <div id="loading" class="loading-shimmer">MIXING CONTENT...</div>
    <div id="sentinel" style="height: 50px;"></div>

    <nav class="bottom-nav">
        <div class="nav-item active" id="home-btn" onclick="setActiveNav(this); loadCategory('mix_home')"><i class="material-icons">home</i>Home</div>
        <div class="nav-item" id="shorts-btn" onclick="setActiveNav(this); loadShorts()"><i class="material-icons">bolt</i>Shorts</div>
        <div class="nav-item" onclick="setActiveNav(this); loadCategory('New Punjabi Music 2026')"><i class="material-icons">subscriptions</i>Subs</div>
        <div class="nav-item" onclick="alert('Library Empty')"><i class="material-icons">video_library</i>Library</div>
    </nav>

    <script>
        // NEW API KEY APPLIED
        const API_KEY = 'AIzaSyBsEsHKy70X0jKIz3y2NNe863uCr45_qHg';
        const videoFeed = document.getElementById('main-video-feed');
        let nextPageToken = ''; 
        let isLoading = false;
        let isShortsMode = false;
        let currentQuery = 'bollywood movies | pakistani drama | hollywood songs | bhojpuri songs'; 
        let loadedVideoIds = new Set();

        window.onload = () => {
            setTimeout(() => {
                const splash = document.getElementById('zabplay-splash');
                splash.style.transition = 'opacity 0.5s';
                splash.style.opacity = '0';
                setTimeout(() => splash.style.display = 'none', 500);
                loadYouTubeVideos();
            }, 2500);
        };

        function setActiveNav(el) {
            document.querySelectorAll('.nav-item').forEach(item => item.classList.remove('active'));
            el.classList.add('active');
        }

        function loadShorts() {
            isShortsMode = true;
            document.getElementById('main-header').style.display = 'none';
            loadCategory('trending shorts viral india');
        }

        async function loadCategory(query) {
            if (isLoading) return;
            window.scrollTo(0, 0);
            videoFeed.innerHTML = '';
            
            if (!query.includes('shorts')) {
                isShortsMode = false;
                document.getElementById('main-header').style.display = 'flex';
                videoFeed.className = ""; 
            } else {
                isShortsMode = true;
                videoFeed.className = "shorts-container";
            }

            if(query === 'mix_home') {
                currentQuery = 'bollywood movie trailer | pakistani drama OST | hollywood trailers | bhojpuri song 2026';
            } else {
                currentQuery = query;
            }

            nextPageToken = '';
            loadedVideoIds.clear(); 
            document.getElementById('loading').innerText = isShortsMode ? "LOADING SHORTS..." : "MIXING CONTENT...";
            loadYouTubeVideos();
        }

        async function loadYouTubeVideos() {
            if (isLoading) return;
            isLoading = true;
            document.getElementById('loading').style.display = 'block';

            try {
                const durationFilter = isShortsMode ? "&videoDuration=short" : "&videoDuration=medium";
                const url = `https://www.googleapis.com/youtube/v3/search?part=snippet&maxResults=15&q=${encodeURIComponent(currentQuery)}&type=video${durationFilter}&pageToken=${nextPageToken}&key=${API_KEY}`;
                
                const response = await fetch(url);
                
                // QUOTA CHECK
                if (response.status === 403) {
                    document.getElementById('loading').innerHTML = "<div style='color:#FF5252; padding:20px;'><b>API Limit Finished!</b><br>Try another key or wait until tomorrow.</div>";
                    isLoading = false;
                    return;
                }

                const data = await response.json();

                if (data.items) {
                    nextPageToken = data.nextPageToken || ''; 

                    data.items.forEach(item => {
                        const vId = item.id.videoId;
                        if(!vId || loadedVideoIds.has(vId)) return;
                        loadedVideoIds.add(vId);

                        const card = document.createElement('div');
                        const channelTitle = item.snippet.channelTitle;
                        const channelIcon = `https://ui-avatars.com/api/?name=${encodeURIComponent(channelTitle)}&background=random&color=fff`;
                        
                        if(isShortsMode) {
                            card.className = 'short-card-full';
                            card.innerHTML = `
                                <img src="https://img.youtube.com/vi/${vId}/maxresdefault.jpg" onerror="this.src='https://img.youtube.com/vi/${vId}/hqdefault.jpg'" onclick="window.location.href='player.html?v=${vId}'">
                                <div class="short-actions">
                                    <div><i class="material-icons">favorite</i><span>2.5L</span></div>
                                    <div><i class="material-icons">chat</i><span>450</span></div>
                                    <div><i class="material-icons">share</i><span>Share</span></div>
                                    <div style="margin-top:10px;"><img src="${channelIcon}" style="width:35px; height:35px; border-radius:50%; border:2px solid white;"></div>
                                </div>
                                <div class="short-overlay">
                                    <div style="display:flex; align-items:center; gap:10px; margin-bottom:8px; pointer-events:auto;">
                                        <span style="font-weight:bold; font-size:15px;">@${channelTitle.replace(/\s+/g, '').toLowerCase()}</span>
                                        <button style="background:red; color:white; border:none; padding:6px 15px; border-radius:20px; font-size:12px; font-weight:bold;">SUBSCRIBE</button>
                                    </div>
                                    <div class="short-title">${item.snippet.title}</div>
                                </div>
                            `;
                        } else {
                            card.className = 'video-card';
                            card.innerHTML = `
                                <div class="thumbnail-container">
                                    <img src="${item.snippet.thumbnails.high.url}">
                                </div>
                                <div class="video-info">
                                    <img class="channel-icon" src="${channelIcon}">
                                    <div class="video-text">
                                        <h3>${item.snippet.title}</h3>
                                        <p>${channelTitle} • ZabPlay</p>
                                    </div>
                                </div>`;
                            card.onclick = () => window.location.href = `player.html?v=${vId}`;
                        }
                        videoFeed.appendChild(card);
                    });
                }
            } catch (error) {
                console.error("API Error:", error);
                document.getElementById('loading').innerText = "CONNECTION ERROR";
            } finally {
                isLoading = false;
                document.getElementById('loading').style.display = 'none';
            }
        }

        // Infinite Scroll Logic
        videoFeed.onscroll = () => {
            if (isShortsMode && (videoFeed.innerHeight + videoFeed.scrollTop) >= videoFeed.scrollHeight - 500) {
                loadYouTubeVideos();
            }
        };

        window.onscroll = () => {
            if (!isShortsMode && (window.innerHeight + window.scrollY) >= document.body.offsetHeight - 800) {
                loadYouTubeVideos();
            }
        };

        function logout() { localStorage.removeItem('isLoggedIn'); window.location.href = 'login.html'; }
    </script>
</body>
</html>
