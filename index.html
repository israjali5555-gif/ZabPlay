<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <link href="https://fonts.googleapis.com/icon?family=Material+Icons" rel="stylesheet">
    <title>ZabPlay - Unlimited Mix</title>
    <style>
        body { background:#0F0F0F; margin:0; font-family: Roboto, Arial, sans-serif; color: white; overflow-x: hidden; }
        .header { position: sticky; top: 0; background: #0F0F0F; z-index: 1000; display: flex; align-items: center; justify-content: space-between; padding: 10px 15px; border-bottom: 1px solid #222; }
        .brand-name { font-size: 20px; font-weight: bold; color: red; }
        
        /* Video Card Style */
        .video-card { width: 100%; margin-bottom: 15px; cursor: pointer; }
        .thumb-container { position: relative; width: 100%; aspect-ratio: 16/9; background: #222; }
        .thumb-container img { width: 100%; height: 100%; object-fit: cover; }
        .video-info { display: flex; padding: 12px; gap: 12px; }
        .channel-icon { width: 40px; height: 40px; border-radius: 50%; object-fit: cover; background: #333; }
        .video-text h3 { font-size: 15px; margin: 0; line-height: 1.4; display: -webkit-box; -webkit-line-clamp: 2; -webkit-box-orient: vertical; overflow: hidden; }
        .video-text p { font-size: 12px; color: #aaa; margin: 5px 0 0 0; }

        /* Navigation */
        .bottom-nav { position: fixed; bottom: 0; width: 100%; background: #0F0F0F; display: flex; justify-content: space-around; padding: 10px 0; border-top: 1px solid #333; z-index: 1000; }
        .nav-item { color: white; text-align: center; font-size: 10px; text-decoration: none; opacity: 0.6; }
        .nav-item i { font-size: 24px; display: block; }
        .nav-item.active { opacity: 1; color: #FF0000; }
        
        #loader { text-align: center; padding: 20px; color: red; font-weight: bold; }
    </style>
</head>
<body>

    <header class="header">
        <div class="brand-name">ZabPlay</div>
        <div style="display: flex; gap: 18px;"><i class="material-icons">search</i><i class="material-icons">account_circle</i></div>
    </header>

    <main id="main-video-feed" style="padding-bottom: 70px;"></main>
    <div id="loader">MIXING CONTENT...</div>

    <nav class="bottom-nav">
        <div class="nav-item active" onclick="location.reload()"><i class="material-icons">home</i>Home</div>
        <div class="nav-item" onclick="window.location.href='shorts.html'"><i class="material-icons">bolt</i>Shorts</div>
        <div class="nav-item"><i class="material-icons">subscriptions</i>Subs</div>
        <div class="nav-item"><i class="material-icons">video_library</i>Library</div>
    </nav>

    <script>
        const API_KEY = 'AIzaSyBsEsHKy70X0jKIz3y2NNe863uCr45_qHg'; // Aapki Key
        const videoFeed = document.getElementById('main-video-feed');
        let isFetching = false;
        
        // UNLIMITED MIX TOPICS (Bina Shorts Ke)
        const topics = ["Bollywood Movie 2026", "New Punjabi Songs", "Pakistani Drama Full", "Bhojpuri Video Gana", "Hollywood Dubbed Movies", "Comedy Circus Full"];

        async function fetchUnlimitedHome() {
            if (isFetching) return;
            isFetching = true;
            
            let query = topics[Math.floor(Math.random() * topics.length)];
            
            try {
                // PROXY SEARCH: Isse API limit kharch nahi hogi
                const res = await fetch(`https://pipedapi.kavin.rocks/search?q=${encodeURIComponent(query)}&filter=videos`);
                const data = await res.json();
                
                data.content.forEach(v => {
                    if(v.duration < 60) return; // Shorts ko home se hatane ke liye

                    const card = document.createElement('div');
                    card.className = 'video-card';
                    card.onclick = () => window.location.href = `player.html?v=${v.videoId}`;
                    card.innerHTML = `
                        <div class="thumb-container"><img src="${v.thumbnail}"></div>
                        <div class="video-info">
                            <img class="channel-icon" src="${v.uploaderAvatar || 'https://ui-avatars.com/api/?name=Z'}">
                            <div class="video-text">
                                <h3>${v.title}</h3>
                                <p>${v.uploaderName} • ${v.views.toLocaleString()} views</p>
                            </div>
                        </div>`;
                    videoFeed.appendChild(card);
                });
            } catch (e) { console.error("Switching to backup..."); }
            isFetching = false;
        }

        window.onscroll = () => {
            if ((window.innerHeight + window.scrollY) >= document.body.offsetHeight - 1000) fetchUnlimitedHome();
        };

        fetchUnlimitedHome(); // Pehla load
    </script>
</body>
</html>
