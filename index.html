<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <link href="https://fonts.googleapis.com/icon?family=Material+Icons" rel="stylesheet">
    <title>ZabPlay - Unlimited Experience</title>
    
    <script>
        if (localStorage.getItem('isLoggedIn') !== 'true') {
            window.location.href = 'login.html';
        }
    </script>

    <style>
        body { background:#0F0F0F; margin:0; font-family: Roboto, Arial, sans-serif; color: white; overflow-x: hidden; }
        
        /* === LOGO FIX (Wahi jo aapne banaya) === */
        .zab-logo-box {
            width: 32px; height: 32px;
            background: linear-gradient(135deg, #FF0000 0%, #8B0000 100%);
            border-radius: 8px;
            display: flex; align-items: center; justify-content: center;
            box-shadow: 0 0 10px rgba(255, 0, 0, 0.4);
            border: 1px solid rgba(255, 255, 255, 0.1);
        }
        .zab-logo-box::after {
            content: '';
            border-top: 6px solid transparent; border-bottom: 6px solid transparent;
            border-left: 10px solid white; margin-left: 2px;
        }

        .splash-logo-box {
            width: 100px; height: 100px;
            background: linear-gradient(135deg, #FF0000 0%, #8B0000 100%);
            border-radius: 20px;
            display: flex; align-items: center; justify-content: center;
            box-shadow: 0 0 30px rgba(255, 0, 0, 0.6);
        }
        .splash-logo-box::after {
            content: '';
            border-top: 20px solid transparent; border-bottom: 20px solid transparent;
            border-left: 35px solid white; margin-left: 5px;
        }

        /* === VIDEO FEED STYLE === */
        .video-card { width: 100%; margin-bottom: 15px; animation: fadeIn 0.5s ease-in; cursor: pointer; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
        
        .thumbnail-container { position: relative; width: 100%; aspect-ratio: 16/9; background: #222; }
        .thumbnail-container img { width: 100%; height: 100%; object-fit: cover; }
        
        /* SHORTS SPECIAL GRID - Instagram Style */
        .shorts-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 5px; padding: 5px; }
        .short-card { aspect-ratio: 9/16; position: relative; border-radius: 12px; overflow: hidden; background: #111; }
        .short-card img { width: 100%; height: 100%; object-fit: cover; }
        .short-overlay { position: absolute; inset: 0; background: linear-gradient(to bottom, transparent 60%, rgba(0,0,0,0.8)); display: flex; flex-direction: column; justify-content: flex-end; padding: 10px; }
        .short-title { font-size: 11px; font-weight: bold; margin-bottom: 5px; display: -webkit-box; -webkit-line-clamp: 2; -webkit-box-orient: vertical; overflow: hidden; }
        
        /* Interaction Buttons on Shorts */
        .short-actions { position: absolute; top: 10px; right: 8px; display: flex; flex-direction: column; gap: 12px; text-shadow: 1px 1px 3px rgba(0,0,0,0.8); }
        .short-actions i { font-size: 20px; color: white; cursor: pointer; }

        .video-info { display: flex; padding: 12px; gap: 12px; }
        .channel-icon { width: 40px; height: 40px; border-radius: 50%; background: #333; flex-shrink: 0; }
        
        .video-text h3 { font-size: 15px; margin: 0; line-height: 1.4; display: -webkit-box; -webkit-line-clamp: 2; -webkit-box-orient: vertical; overflow: hidden; }
        .video-text p { font-size: 12px; color: #aaa; margin: 5px 0 0 0; }

        .header { position: sticky; top: 0; background: #0F0F0F; z-index: 1000; display: flex; align-items: center; justify-content: space-between; padding: 10px 15px; border-bottom: 1px solid #222; }
        .brand-container { display: flex; align-items: center; gap: 10px; }
        .brand-name { font-size: 20px; font-weight: bold; }

        .bottom-nav { position: fixed; bottom: 0; width: 100%; background: #0F0F0F; display: flex; justify-content: space-around; padding: 10px 0; border-top: 1px solid #333; z-index: 1000; }
        .nav-item { color: white; text-align: center; font-size: 10px; text-decoration: none; opacity: 0.8; cursor: pointer; }
        .nav-item i { font-size: 24px; display: block; margin-bottom: 2px; }
        .nav-item:active, .nav-item.active { opacity: 1; color: #FF0000; }

        #zabplay-splash { position: fixed; inset: 0; background: #0F0F0F; display: flex; flex-direction: column; justify-content: center; align-items: center; z-index: 9999; }
        .loading-shimmer { padding: 30px; text-align: center; color: #FF0000; font-weight: bold; font-size: 14px; }
    </style>
</head>
<body>

    <div id="zabplay-splash">
        <div class="splash-logo-box"></div>
        <h2 style="margin-top: 20px; letter-spacing: 2px; font-family: sans-serif;">ZABPLAY</h2>
    </div>

    <header class="header">
        <div class="brand-container">
            <div class="zab-logo-box"></div>
            <span class="brand-name">ZabPlay</span>
        </div>
        <div style="display: flex; gap: 15px; align-items: center;">
            <i class="material-icons">cast</i>
            <i class="material-icons" onclick="loadCategory('New Hindi Movies 2026')">search</i>
            <div style="width: 28px; height: 28px; border-radius: 50%; background: #FF5722; text-align: center; line-height: 28px; font-weight: bold; font-size: 14px;" onclick="logout()">R</div>
        </div>
    </header>

    <main id="main-video-feed" style="padding-bottom: 80px;"></main>
    
    <div id="loading" class="loading-shimmer">EXPLORING...</div>
    <div id="sentinel" style="height: 100px;"></div>

    <nav class="bottom-nav">
        <div class="nav-item active" id="home-btn" onclick="loadCategory('latest movies trailers songs')"><i class="material-icons">home</i>Home</div>
        <div class="nav-item" id="shorts-btn" onclick="loadShorts()"><i class="material-icons">bolt</i>Shorts</div>
        <div class="nav-item" onclick="loadCategory('New Punjabi Music 2026')"><i class="material-icons">subscriptions</i>Subs</div>
        <div class="nav-item" onclick="alert('Library is empty!')"><i class="material-icons">video_library</i>Library</div>
    </nav>

    <script>
        const API_KEY = 'AIzaSyDq0kXgyqtOFXPjytI5yw5tuIZYl-xuTFs';
        const videoFeed = document.getElementById('main-video-feed');
        let nextPageToken = ''; 
        let isLoading = false;
        let currentQuery = 'latest movies trailers songs'; 
        let isShortsMode = false;
        let loadedVideoIds = new Set();

        window.onload = () => {
            setTimeout(() => {
                const splash = document.getElementById('zabplay-splash');
                splash.style.transition = 'opacity 0.5s';
                splash.style.opacity = '0';
                setTimeout(() => splash.style.display = 'none', 500);
                loadYouTubeVideos();
            }, 2500);
        };

        function loadShorts() {
            isShortsMode = true;
            loadCategory('#shorts trending india viral');
        }

        async function loadCategory(query) {
            if (isLoading) return;
            window.scrollTo(0, 0);
            videoFeed.innerHTML = '';
            
            isShortsMode = query.includes('#shorts');
            videoFeed.className = isShortsMode ? "shorts-grid" : ""; 

            nextPageToken = '';
            currentQuery = query;
            loadedVideoIds.clear(); 
            document.getElementById('loading').innerText = "FETCHING FRESH CONTENT...";
            loadYouTubeVideos();
        }

        async function loadYouTubeVideos() {
            if (isLoading) return;
            isLoading = true;
            document.getElementById('loading').style.display = 'block';

            try {
                const durationFilter = isShortsMode ? "&videoDuration=short" : "&videoDuration=medium";
                const url = `https://www.googleapis.com/youtube/v3/search?part=snippet&maxResults=25&q=${encodeURIComponent(currentQuery)}&type=video${durationFilter}&pageToken=${nextPageToken}&key=${API_KEY}`;
                
                const response = await fetch(url);
                const data = await response.json();

                if (data.items) {
                    nextPageToken = data.nextPageToken || ''; 

                    data.items.forEach(item => {
                        const vId = item.id.videoId;
                        if(!vId || loadedVideoIds.has(vId)) return;
                        loadedVideoIds.add(vId);

                        const card = document.createElement('div');
                        const channelTitle = item.snippet.channelTitle;
                        
                        if(isShortsMode) {
                            // --- ADVANCED SHORTS UI ---
                            card.className = 'short-card';
                            card.innerHTML = `
                                <img src="https://img.youtube.com/vi/${vId}/hqdefault.jpg">
                                <div class="short-actions">
                                    <i class="material-icons">favorite_border</i>
                                    <i class="material-icons">chat_bubble_outline</i>
                                    <i class="material-icons">share</i>
                                </div>
                                <div class="short-overlay">
                                    <div class="short-title">${item.snippet.title}</div>
                                    <div style="display:flex; align-items:center; gap:6px;">
                                        <img src="https://ui-avatars.com/api/?name=${encodeURIComponent(channelTitle)}&background=random" style="width:18px; height:18px; border-radius:50%; border:1px solid white;">
                                        <span style="font-size:10px; font-weight:bold;">@${channelTitle.replace(/\s+/g, '').toLowerCase()}</span>
                                    </div>
                                </div>
                            `;
                        } else {
                            // --- HOME UI ---
                            card.className = 'video-card';
                            card.innerHTML = `
                                <div class="thumbnail-container">
                                    <img src="${item.snippet.thumbnails.high.url}">
                                </div>
                                <div class="video-info">
                                    <img class="channel-icon" src="https://ui-avatars.com/api/?name=${encodeURIComponent(channelTitle)}&background=random">
                                    <div class="video-text">
                                        <h3>${item.snippet.title}</h3>
                                        <p>${channelTitle} • YouTube</p>
                                    </div>
                                </div>`;
                        }
                        
                        card.onclick = () => window.location.href = `player.html?v=${vId}`;
                        videoFeed.appendChild(card);
                    });
                }
            } catch (error) {
                console.error("API Error:", error);
            } finally {
                isLoading = false;
                document.getElementById('loading').style.display = 'none';
            }
        }

        // Professional Infinite Scroll (Instagram Style)
        const observer = new IntersectionObserver((entries) => {
            if (entries[0].isIntersecting && !isLoading && nextPageToken) {
                loadYouTubeVideos();
            }
        }, { threshold: 0.1, rootMargin: '300px' }); // 300px pehle hi agla page load shuru ho jayega

        observer.observe(document.getElementById('sentinel'));

        function logout() { localStorage.removeItem('isLoggedIn'); window.location.href = 'login.html'; }
    </script>
</body>
</html>
