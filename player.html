<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <link href="https://fonts.googleapis.com/icon?family=Material+Icons" rel="stylesheet">
    <title>ZabPlay - Smart Player</title>
    <style>
        body { background:#0F0F0F; color:white; margin:0; font-family: "Roboto", sans-serif; overflow-x: hidden; }
        .video-wrapper { position: sticky; top: 0; z-index: 1000; background: #000; width: 100%; aspect-ratio: 16/9; box-shadow: 0 4px 10px rgba(0,0,0,0.8); }
        #player { width: 100%; height: 100%; border:none; }
        .info-card { padding: 15px; background: #0F0F0F; }
        .video-title { font-size: 17px; font-weight: bold; line-height: 1.4; margin-bottom: 8px; color: #fff; display: -webkit-box; -webkit-line-clamp: 2; -webkit-box-orient: vertical; overflow: hidden;}
        .meta-text { font-size: 12px; color: #aaa; margin-bottom: 15px; }
        .action-row { display: flex; gap: 10px; overflow-x: auto; margin-bottom: 20px; scrollbar-width: none; }
        .chip { background: #272727; border: none; color: white; padding: 8px 16px; border-radius: 20px; font-size: 13px; display: flex; align-items: center; white-space: nowrap; }
        .chip i { font-size: 18px; margin-right: 6px; }
        .channel-section { display: flex; align-items: center; gap: 12px; padding: 12px 0; border-top: 1px solid #222; border-bottom: 1px solid #222; margin-bottom: 20px; }
        .channel-section img { width: 38px; height: 38px; border-radius: 50%; background: #333; object-fit: cover; }
        .sub-btn { background: #fff; color: #000; border: none; padding: 8px 16px; border-radius: 20px; font-weight: bold; font-size: 13px; margin-left: auto; }
        .up-next-title { font-size: 15px; font-weight: bold; padding: 15px; color: #fff; }
        .suggestion-card { display: flex; gap: 12px; padding: 10px 15px; text-decoration: none; color: white; }
        .suggestion-card .thumb-box { position: relative; width: 150px; flex-shrink: 0; aspect-ratio: 16/9; }
        .suggestion-card img { width: 100%; height: 100%; border-radius: 8px; object-fit: cover; background: #222; }
        .s-text { flex: 1; overflow: hidden; }
        .s-title { font-size: 14px; font-weight: 500; line-height: 1.3; display: -webkit-box; -webkit-line-clamp: 2; -webkit-box-orient: vertical; overflow: hidden; margin-bottom: 4px; }
        .s-meta { font-size: 11px; color: #aaa; }
        #loading-indicator { text-align: center; padding: 30px; color: #FF0000; font-weight: bold; font-size: 14px; }
    </style>
</head>
<body>
    <div class="video-wrapper">
        <iframe id="player" src="" allow="autoplay; fullscreen"></iframe>
    </div>
    
    <div class="info-card">
        <div class="video-title" id="v-title">Loading video...</div>
        <div class="meta-text" id="v-meta">-- views • ZabPlay Premium</div>
        <div class="action-row">
            <button class="chip"><i class="material-icons">thumb_up_off_alt</i> <span id="v-likes">--</span></button>
            <button class="chip"><i class="material-icons">share</i> Share</button>
            <button class="chip"><i class="material-icons">download</i> Download</button>
        </div>
        <div class="channel-section">
            <img id="c-img" src="">
            <div>
                <div style="font-weight:bold; font-size:15px;" id="c-name">Loading...</div>
                <div style="font-size:12px; color:#aaa;" id="c-subs">-- subscribers</div>
            </div>
            <button class="sub-btn">Subscribe</button>
        </div>
    </div>

    <div class="up-next-title">Up Next • Mixed Hits</div>
    <div id="suggestions-container"></div>
    <div id="loading-indicator">MIXING MORE CONTENT...</div>

    <script>
        // API Key sirf details ke liye (Bahut kam quota kharch karegi)
        const API_KEY = 'AIzaSyBsEsHKy70X0jKIz3y2NNe863uCr45_qHg'; 
        const urlParams = new URLSearchParams(window.location.search);
        let videoId = urlParams.get('v');
        let isLoadingRelated = false;

        if (!videoId) window.location.href = 'index.html';

        // Direct Embed for No-Limit Playback
        document.getElementById('player').src = `https://www.youtube.com/embed/${videoId}?autoplay=1&rel=0&modestbranding=1`;

        async function fetchVideoDetails() {
            try {
                // API Key use karke title aur channel info lena
                const vRes = await fetch(`https://www.googleapis.com/youtube/v3/videos?part=snippet,statistics&id=${videoId}&key=${API_KEY}`);
                const vData = await vRes.json();
                if(!vData.items[0]) return;
                
                const video = vData.items[0];
                document.getElementById('v-title').innerText = video.snippet.title;
                document.getElementById('v-meta').innerText = formatViews(video.statistics.viewCount) + " views";
                document.getElementById('v-likes').innerText = formatViews(video.statistics.likeCount);

                const cRes = await fetch(`https://www.googleapis.com/youtube/v3/channels?part=snippet,statistics&id=${video.snippet.channelId}&key=${API_KEY}`);
                const cData = await cRes.json();
                document.getElementById('c-name').innerText = cData.items[0].snippet.title;
                document.getElementById('c-img').src = cData.items[0].snippet.thumbnails.default.url;
                document.getElementById('c-subs').innerText = formatViews(cData.items[0].statistics.subscriberCount) + " subscribers";

                // Suggestions load karna bina API limit kharch kiye
                loadUnlimitedRelated(video.snippet.title);
            } catch (e) { console.error("Quota issue, switching to full proxy..."); loadUnlimitedRelated("Trending Mix"); }
        }

        async function loadUnlimitedRelated(title) {
            if (isLoadingRelated) return;
            isLoadingRelated = true;

            // SMART MIXING: Title ke words + random category mix
            const mixKeywords = ["latest hits", "top mix", "new songs"];
            const query = title.split(' ').slice(0, 2).join(' ') + " " + mixKeywords[Math.floor(Math.random() * mixKeywords.length)];

            try {
                // UNLIMITED PROXY: Isse API Key kharch nahi hoti (0 Units)
                const res = await fetch(`https://pipedapi.kavin.rocks/search?q=${encodeURIComponent(query)}&filter=videos`);
                const data = await res.json();
                
                if(data.content) {
                    let html = "";
                    data.content.forEach(item => {
                        if(item.videoId === videoId) return;
                        html += `
                        <a class="suggestion-card" href="player.html?v=${item.videoId}">
                            <div class="thumb-box"><img src="${item.thumbnail}"></div>
                            <div class="s-text">
                                <div class="s-title">${item.title}</div>
                                <div class="s-meta">${item.uploaderName} • ZabPlay Mix</div>
                            </div>
                        </a>`;
                    });
                    document.getElementById('suggestions-container').innerHTML += html;
                }
            } catch (e) { console.error("Proxy error"); }
            isLoadingRelated = false;
        }

        // Infinite Scroll
        window.onscroll = () => {
            if ((window.innerHeight + window.scrollY) >= document.body.offsetHeight - 800) {
                loadUnlimitedRelated(document.getElementById('v-title').innerText);
            }
        };

        function formatViews(num) {
            if (num >= 1000000) return (num / 1000000).toFixed(1) + 'M';
            if (num >= 1000) return (num / 1000).toFixed(1) + 'K';
            return num;
        }

        // Run on load
        fetchVideoDetails();
    </script>
</body>
</html>
