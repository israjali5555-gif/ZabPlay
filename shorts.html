<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <link href="https://fonts.googleapis.com/icon?family=Material+Icons" rel="stylesheet">
    <title>ZabPlay Shorts</title>
    <style>
        body, html { margin: 0; padding: 0; width: 100%; height: 100%; background: #000; overflow: hidden; font-family: 'Roboto', sans-serif; }
        
        /* Full Screen Vertical Container */
        .shorts-container {
            width: 100%;
            height: 100vh;
            overflow-y: scroll;
            scroll-snap-type: y mandatory;
            scrollbar-width: none;
        }
        .shorts-container::-webkit-scrollbar { display: none; }

        .short-video-section {
            width: 100%;
            height: 100vh;
            scroll-snap-align: start;
            position: relative;
            background: #000;
            display: flex;
            align-items: center;
        }

        .video-box { width: 100%; height: 100%; position: relative; }
        iframe { width: 100%; height: 100%; border: none; }

        /* Overlay for Info & Actions */
        .overlay {
            position: absolute;
            bottom: 80px;
            left: 15px;
            right: 70px;
            display: flex;
            flex-direction: column;
            z-index: 10;
            pointer-events: none;
        }
        .channel-info { display: flex; align-items: center; gap: 10px; margin-bottom: 10px; pointer-events: auto; }
        .channel-info img { width: 35px; height: 35px; border-radius: 50%; border: 2px solid white; }
        .channel-info span { font-weight: bold; color: white; text-shadow: 1px 1px 2px black; }
        .video-title { font-size: 14px; font-weight: 400; color: white; text-shadow: 1px 1px 2px black; line-height: 1.4; }

        .side-actions {
            position: absolute;
            right: 12px;
            bottom: 100px;
            display: flex;
            flex-direction: column;
            gap: 22px;
            align-items: center;
            z-index: 20;
        }
        .action-btn { color: white; text-align: center; font-size: 11px; font-weight: bold; }
        .action-btn i { font-size: 32px; display: block; margin-bottom: 4px; text-shadow: 0 0 10px rgba(0,0,0,0.5); }
        .action-btn.fav i { color: #FF0000; }

        /* Bottom Nav Fix */
        .bottom-nav { position: fixed; bottom: 0; width: 100%; background: linear-gradient(transparent, #000); display: flex; justify-content: space-around; padding: 12px 0; z-index: 1000; }
        .nav-item { color: #aaa; text-align: center; text-decoration: none; font-size: 10px; opacity: 0.8; }
        .nav-item i { display: block; font-size: 26px; margin-bottom: 2px; }
        .nav-item.active { color: white; opacity: 1; }
    </style>
</head>
<body>

    <div class="shorts-container" id="shorts-wrapper">
        </div>

    <nav class="bottom-nav">
        <a href="index.html" class="nav-item"><i class="material-icons">home</i>Home</a>
        <a href="shorts.html" class="nav-item active"><i class="material-icons">bolt</i>Shorts</a>
        <a href="#" class="nav-item"><i class="material-icons">subscriptions</i>Sub</a>
        <a href="#" class="nav-item"><i class="material-icons">video_library</i>Library</a>
    </nav>

    <script>
        // BACKUP API KEYS (Same as index/player)
        const API_KEYS = [
            'AIzaSyC8od7zBiEtYiTrp-7b1qbUicec4yGgXOs',
            'AIzaSyDq0kXgyqtOFXPjytI5yw5tuIZYl-xuTFs',
            'AIzaSyBsEsHKy70X0jKIz3y2NNe863uCr45_qHg'
        ];
        
        let isFetching = false;
        const shortTopics = ["Trending Shorts India", "Funny Comedy Shorts", "Satisfying Shorts", "New Viral Reels"];
        let loadedShorts = new Set();

        async function fetchShorts() {
            if (isFetching) return;
            isFetching = true;

            let query = shortTopics[Math.floor(Math.random() * shortTopics.length)];
            
            try {
                // UNLIMITED PROXY SYSTEM
                const res = await fetch(`https://pipedapi.kavin.rocks/search?q=${encodeURIComponent(query)}&filter=videos`);
                const data = await res.json();
                
                const wrapper = document.getElementById('shorts-wrapper');
                data.content.forEach(v => {
                    if (loadedShorts.has(v.videoId)) return;
                    loadedShorts.add(v.videoId);

                    const section = document.createElement('div');
                    section.className = 'short-video-section';
                    section.innerHTML = `
                        <div class="video-box">
                            <iframe src="https://www.youtube.com/embed/${v.videoId}?autoplay=1&controls=0&loop=1&playlist=${v.videoId}&modestbranding=1&rel=0&iv_load_policy=3" allow="autoplay; fullscreen"></iframe>
                            <div class="overlay">
                                <div class="channel-info">
                                    <img src="${v.uploaderAvatar || 'https://ui-avatars.com/api/?name=' + v.uploaderName}">
                                    <span>@${v.uploaderName.replace(/\s+/g, '').toLowerCase()}</span>
                                    <button style="background:red; color:white; border:none; padding:5px 12px; border-radius:15px; font-size:11px; margin-left:5px;">Follow</button>
                                </div>
                                <div class="video-title">${v.title}</div>
                            </div>
                            <div class="side-actions">
                                <div class="action-btn"><i class="material-icons">favorite</i>${Math.floor(Math.random() * 900) + 100}K</div>
                                <div class="action-btn"><i class="material-icons">insert_comment</i>${Math.floor(Math.random() * 90) + 10}K</div>
                                <div class="action-btn"><i class="material-icons">share</i>Share</div>
                                <div class="action-btn"><i class="material-icons">more_vert</i></div>
                            </div>
                        </div>
                    `;
                    wrapper.appendChild(section);
                });
            } catch (e) { 
                console.error("Switching to Backup Keys...");
                // Fallback to API keys could be added here if needed
            }
            isFetching = false;
        }

        // Infinite Scroll
        const wrapper = document.getElementById('shorts-wrapper');
        wrapper.addEventListener('scroll', () => {
            if (wrapper.scrollTop + wrapper.clientHeight >= wrapper.scrollHeight - 1000) {
                fetchShorts();
            }
        });

        // Initial Load
        fetchShorts();
        fetchShorts(); // Double fetch for smoother start
    </script>
</body>
</html>
