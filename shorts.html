<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <link href="https://fonts.googleapis.com/icon?family=Material+Icons" rel="stylesheet">
    <title>ZabPlay Shorts</title>
    <style>
        body, html { margin: 0; padding: 0; width: 100%; height: 100%; background: #000; overflow: hidden; font-family: sans-serif; }
        
        /* Full Screen Vertical Container */
        .shorts-container {
            width: 100%;
            height: 100vh;
            overflow-y: scroll;
            scroll-snap-type: y mandatory; /* Isse video ek-ek karke rukegi */
            scrollbar-width: none;
        }
        .shorts-container::-webkit-scrollbar { display: none; }

        .short-video-section {
            width: 100%;
            height: 100vh;
            scroll-snap-align: start;
            position: relative;
            background: #000;
        }

        iframe { width: 100%; height: 100%; border: none; pointer-events: none; }

        /* Overlay for Info & Actions */
        .overlay {
            position: absolute;
            bottom: 80px;
            left: 15px;
            right: 15px;
            display: flex;
            flex-direction: column;
            z-index: 10;
        }
        .channel-info { display: flex; align-items: center; gap: 10px; margin-bottom: 10px; }
        .channel-info img { width: 35px; height: 35px; border-radius: 50%; border: 2px solid white; }
        .video-title { font-size: 14px; font-weight: 500; color: white; text-shadow: 1px 1px 2px black; }

        .side-actions {
            position: absolute;
            right: 10px;
            bottom: 100px;
            display: flex;
            flex-direction: column;
            gap: 20px;
            align-items: center;
        }
        .action-btn { color: white; text-align: center; font-size: 12px; }
        .action-btn i { font-size: 30px; display: block; margin-bottom: 5px; }

        /* Bottom Nav */
        .bottom-nav { position: fixed; bottom: 0; width: 100%; background: rgba(0,0,0,0.8); display: flex; justify-content: space-around; padding: 10px 0; border-top: 1px solid #333; z-index: 1000; }
        .nav-item { color: #aaa; text-align: center; text-decoration: none; font-size: 10px; }
        .nav-item i { display: block; font-size: 24px; }
        .nav-item.active { color: white; }
    </style>
</head>
<body>

    <div class="shorts-container" id="shorts-wrapper">
        </div>

    <div class="bottom-nav">
        <a href="index.html" class="nav-item"><i class="material-icons">home</i>Home</a>
        <a href="shorts.html" class="nav-item active"><i class="material-icons">bolt</i>Shorts</a>
        <a href="#" class="nav-item"><i class="material-icons">add_circle_outline</i></a>
        <a href="#" class="nav-item"><i class="material-icons">subscriptions</i>Sub</a>
        <a href="#" class="nav-item"><i class="material-icons">video_library</i>Lib</a>
    </div>

    <script>
        let isFetching = false;
        const shortTopics = ["Funny Shorts", "Comedy Reels", "Trending Shorts India", "Social Media Viral Shorts"];

        async function fetchShorts() {
            if (isFetching) return;
            isFetching = true;

            let query = shortTopics[Math.floor(Math.random() * shortTopics.length)];
            
            try {
                // Unlimited Proxy Search
                const res = await fetch(`https://pipedapi.kavin.rocks/search?q=${encodeURIComponent(query)}&filter=videos`);
                const data = await res.json();
                
                const wrapper = document.getElementById('shorts-wrapper');
                data.content.forEach(v => {
                    // Shorts only (less than 60s) ya phir portrait orientation dikhane ka logic
                    const section = document.createElement('div');
                    section.className = 'short-video-section';
                    section.innerHTML = `
                        <iframe src="https://www.youtube.com/embed/${v.videoId}?autoplay=1&controls=0&loop=1&playlist=${v.videoId}&modestbranding=1&rel=0" allow="autoplay"></iframe>
                        <div class="overlay">
                            <div class="channel-info">
                                <img src="${v.uploaderAvatar || 'https://ui-avatars.com/api/?name=Z'}">
                                <span>@${v.uploaderName}</span>
                            </div>
                            <div class="video-title">${v.title}</div>
                        </div>
                        <div class="side-actions">
                            <div class="action-btn"><i class="material-icons">thumb_up</i>Like</div>
                            <div class="action-btn"><i class="material-icons">comment</i>Comment</div>
                            <div class="action-btn"><i class="material-icons">share</i>Share</div>
                        </div>
                    `;
                    wrapper.appendChild(section);
                });
            } catch (e) { console.error("Shorts Load Error"); }
            isFetching = false;
        }

        // Infinite Scroll (Next shorts load hote rahenge)
        document.getElementById('shorts-wrapper').addEventListener('scroll', function() {
            if (this.scrollTop + this.clientHeight >= this.scrollHeight - 500) {
                fetchShorts();
            }
        });

        // Initial Load
        fetchShorts();
    </script>
</body>
</html>
