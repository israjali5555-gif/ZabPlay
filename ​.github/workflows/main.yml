name: Build ZabPlay APK
on:
  push:
    branches: [ "main" ]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Build APK
        uses: jonasmerlin/webapp-to-apk-action@v1
        with:
          url: https://${{ github.repository_owner }}.github.io/${{ github.event.repository.name }}/
          name: ZabPlay
