name: Build APK
on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Build Web to APK
        uses: simple-elf/web-to-apk-action@v1
        with:
          url: https://${{ github.repository_owner }}.github.io/${{ github.event.repository.name }}/
          name: "ZabPlay"
