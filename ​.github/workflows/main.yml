name: Build Android APK
on: [push]
jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v3

      - name: Build Web to APK
        uses: ayanda-m/web-to-apk-action@v1
        with:
          app-name: "ZabPlay"
          app-id: "com.israjali.zabplay"
          web-url: "https://${{ github.repository_owner }}.github.io/${{ github.event.repository.name }}/"
          icon-path: "" # Agar koi icon hai to uska naam yahan likho
